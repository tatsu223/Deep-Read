<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f766e"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="spine" x1="0" y1="0" x2="0" y2="100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0d6961"/>
      <stop offset="1" stop-color="#047857"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- Left page -->
  <rect x="14" y="22" width="33" height="52" rx="3" fill="white" opacity="0.95"/>
  <!-- Right page (slightly inset/shadow) -->
  <rect x="53" y="22" width="33" height="52" rx="3" fill="white" opacity="0.82"/>
  <!-- Book spine -->
  <rect x="47" y="22" width="6" height="52" fill="url(#spine)" opacity="0.45" rx="1"/>

  <!-- Text lines on left page -->
  <rect x="20" y="34" width="21" height="2.2" rx="1.1" fill="#0f766e" opacity="0.28"/>
  <rect x="20" y="41" width="21" height="2.2" rx="1.1" fill="#0f766e" opacity="0.28"/>
  <rect x="20" y="48" width="15" height="2.2" rx="1.1" fill="#0f766e" opacity="0.28"/>
  <rect x="20" y="55" width="21" height="2.2" rx="1.1" fill="#0f766e" opacity="0.28"/>

  <!-- Magnifying glass (overlapping right page corner) -->
  <circle cx="75" cy="62" r="13" fill="#0f766e" opacity="0.1"/>
  <circle cx="75" cy="62" r="11" stroke="white" stroke-width="3" opacity="0.92"/>
  <!-- Lens shine -->
  <circle cx="71" cy="58" r="3" fill="white" opacity="0.22"/>
  <!-- Handle -->
  <line x1="83" y1="70" x2="90" y2="77" stroke="white" stroke-width="3.2" stroke-linecap="round" opacity="0.92"/>
</svg>
